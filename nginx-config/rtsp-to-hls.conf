# RTSP → HLS conversion using ffmpeg
# Run one process per camera. These are the ffmpeg commands for common camera types.

# ─── Generic RTSP camera ─────────────────────────────────────────────────────
# ffmpeg -rtsp_transport tcp \
#   -i rtsp://admin:password@192.168.1.x:554/stream1 \
#   -c:v copy -c:a aac -f hls \
#   -hls_time 2 -hls_list_size 5 -hls_flags delete_segments \
#   /tmp/hls/cam1/index.m3u8

# ─── Hikvision cameras ────────────────────────────────────────────────────────
# RTSP URL: rtsp://admin:password@192.168.1.x:554/Streaming/Channels/101
# Mainstream (high quality): channel 101
# Substream (low quality):   channel 102

# ─── Dahua cameras ───────────────────────────────────────────────────────────
# RTSP URL: rtsp://admin:password@192.168.1.x:554/cam/realmonitor?channel=1&subtype=0

# ─── Reolink cameras ─────────────────────────────────────────────────────────
# RTSP URL: rtsp://admin:password@192.168.1.x:554/h264Preview_01_main

# ─── Windows batch script (run-cameras.bat) ──────────────────────────────────
# @echo off
# start ffmpeg -rtsp_transport tcp -i rtsp://admin:pass@192.168.1.100:554/stream1 ^
#   -c:v copy -c:a aac -f hls -hls_time 2 -hls_list_size 5 ^
#   C:\nginx\html\hls\cam1\index.m3u8
# start ffmpeg -rtsp_transport tcp -i rtsp://admin:pass@192.168.1.101:554/stream1 ^
#   -c:v copy -c:a aac -f hls -hls_time 2 -hls_list_size 5 ^
#   C:\nginx\html\hls\cam2\index.m3u8

# ─── After HLS is running ────────────────────────────────────────────────────
# In JARVIS, add each camera with:
#   Protocol: HLS
#   HLS URL:  http://<your-ip>/hls/cam1/index.m3u8

# JARVIS nginx configuration
# Handles:
#  1. Reverse proxy for JARVIS Next.js app
#  2. RTSP → HLS conversion (requires nginx-rtmp-module)
#  3. Service proxy for VMware / Kubernetes
#  4. Local LAN domain: jarvis.local

# ─── HLS ingest (nginx-rtmp-module required) ─────────────────────────────────
# Install on Ubuntu: sudo apt install libnginx-mod-rtmp
# Install on Windows: use nginx-win with RTMP build

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application hls {
            live on;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 16s;

            # Push RTSP cameras into this endpoint using ffmpeg:
            # ffmpeg -rtsp_transport tcp -i rtsp://user:pass@192.168.1.x:554/stream1 \
            #   -c:v copy -c:a aac -f flv rtmp://localhost/hls/cam1
        }
    }
}

# ─── HTTP server ──────────────────────────────────────────────────────────────
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # HLS MIME type
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }

    # ─── JARVIS app (main) ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name jarvis.local localhost;

        # Serve JARVIS Next.js app
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # HLS camera streams
        location /hls/ {
            alias /tmp/hls/;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # VMware vSphere proxy
        location /proxy/vmware/ {
            # Set VMWARE_IP to your ESXi/vCenter host
            set $vmware_host 192.168.1.1;
            proxy_pass https://$vmware_host/;
            proxy_ssl_verify off;
            proxy_set_header Host $vmware_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Kubernetes Dashboard proxy
        location /proxy/kubernetes/ {
            proxy_pass http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # Docker Portainer proxy
        location /proxy/portainer/ {
            proxy_pass http://127.0.0.1:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }

    # ─── HTTPS (optional, self-signed) ───────────────────────────────────────
    # Generate cert: openssl req -x509 -nodes -days 365 -newkey rsa:2048
    #   -keyout /etc/ssl/jarvis.key -out /etc/ssl/jarvis.crt
    #
    # server {
    #     listen 443 ssl;
    #     server_name jarvis.local;
    #     ssl_certificate /etc/ssl/jarvis.crt;
    #     ssl_certificate_key /etc/ssl/jarvis.key;
    #     location / { proxy_pass http://127.0.0.1:3000; ... }
    # }
}
